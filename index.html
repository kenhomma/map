<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4教科知識マップ — 中学受験</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#000;--surface:#111;--surface2:#1a1a1a;--border:#2a2a2a;
  --text:#e2e8f0;--text-dim:#64748b;
  --math:#38bdf8;--lang:#a78bfa;--sci:#34d399;--soc:#fb923c;
  --mastered:#22d3a0;--learning:#f59e0b;--weak:#f43f5e;--unset:#2d3748;
  --cross:#fde68a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100%;overflow:hidden}
body{display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;flex-wrap:wrap}
.logo{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--cross);font-size:13px}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.subj-chips{display:flex;gap:4px}
.subj-chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;font-weight:700;border:2px solid transparent;background:var(--surface2);color:var(--text-dim);font-family:inherit;transition:all .15s;white-space:nowrap}
.subj-chip.math{border-color:var(--math);color:var(--math)}.subj-chip.lang{border-color:var(--lang);color:var(--lang)}
.subj-chip.sci{border-color:var(--sci);color:var(--sci)}.subj-chip.soc{border-color:var(--soc);color:var(--soc)}
.subj-chip.all{border-color:var(--cross);color:var(--cross)}
.subj-chip.active.math{background:var(--math);color:#000}.subj-chip.active.lang{background:var(--lang);color:#000}
.subj-chip.active.sci{background:var(--sci);color:#000}.subj-chip.active.soc{background:var(--soc);color:#000}
.subj-chip.active.all{background:var(--cross);color:#000}
.hdr-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.hdr-btn:hover{border-color:var(--cross);color:var(--cross)}
.hdr-btn.primary{background:var(--cross);color:#000;border-color:var(--cross);font-weight:700}
.cross-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);cursor:pointer;white-space:nowrap;user-select:none}
.cross-toggle input{accent-color:var(--cross);width:14px;height:14px;cursor:pointer}
main{flex:1;display:flex;overflow:hidden;position:relative;background:#000}
#graph-container{flex:1;position:relative;overflow:hidden;background:#000}
svg#graph{width:100%;height:100%;display:block;background:#000}
.link{stroke-opacity:.5;fill:none;stroke-width:1.5}
.link.cross{stroke:var(--cross);stroke-width:1.5;stroke-opacity:.35;stroke-dasharray:5,5}
.node circle{cursor:pointer;stroke-width:2;transition:all .15s}
.node:hover circle{stroke-width:3.5;filter:brightness(1.4)}
.node text{pointer-events:none;user-select:none;text-anchor:middle;dominant-baseline:middle}
.status-mastered circle{filter:drop-shadow(0 0 8px var(--mastered))}
.node-unset circle{filter:grayscale(1) brightness(0.35)}
.node-unset text{opacity:.4}
@keyframes nodeUnlock{
  0%  {r:13;opacity:.6}
  40% {r:32;opacity:.9}
  70% {r:22;opacity:1}
  100%{r:13;opacity:1}
}
@keyframes rippleOut{
  0%  {r:14;stroke-opacity:.9;stroke-width:3}
  100%{r:55;stroke-opacity:0;stroke-width:1}
}
@keyframes chainGlow{
  0%  {stroke-opacity:.15}
  50% {stroke-opacity:.9}
  100%{stroke-opacity:.15}
}
.prob-dot{transition:opacity .1s,transform .15s;transform-origin:center}
.prob-dot:hover{opacity:.7;transform:scale(1.7)}
#sidebar{width:280px;min-width:220px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .3s}
#sidebar.collapsed{width:0;min-width:0}
.sb-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-size:13px;font-weight:700}
.close-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;line-height:1}
.sb-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.info-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim)}
.info-row span:last-child{color:var(--text);font-weight:500}
.sec-label{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.chip-list{display:flex;flex-direction:column;gap:3px}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text-dim);cursor:pointer;transition:border-color .1s}
.chip:hover{border-color:var(--cross)}.chip.cross-edge{border-color:var(--cross);color:var(--cross)}
.status-picker{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.s-btn{border:1.5px solid;border-radius:8px;padding:6px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;background:var(--surface2);transition:all .15s}
.s-btn.mastered{border-color:var(--mastered);color:var(--mastered)}.s-btn.learning{border-color:var(--learning);color:var(--learning)}
.s-btn.weak{border-color:var(--weak);color:var(--weak)}.s-btn.unset{border-color:var(--border);color:var(--text-dim)}
.s-btn.active{color:#000!important}
.s-btn.mastered.active{background:var(--mastered)}.s-btn.learning.active{background:var(--learning)}
.s-btn.weak.active{background:var(--weak)}.s-btn.unset.active{background:var(--unset)}
.prob-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:11px;display:flex;flex-direction:column;gap:3px}
.prob-item-top{display:flex;align-items:flex-start;gap:6px}
.prob-text{color:var(--text);flex:1;line-height:1.5;word-break:break-all}
.prob-badge-r{font-size:10px;font-weight:700;border-radius:4px;padding:2px 5px;flex-shrink:0}
.pr-correct{background:rgba(34,211,160,.2);color:var(--mastered)}.pr-wrong{background:rgba(244,63,94,.2);color:var(--weak)}.pr-unknown{background:rgba(100,116,139,.2);color:var(--text-dim)}
.prob-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;flex-shrink:0}.prob-del:hover{color:var(--weak)}
.prob-meta{color:var(--text-dim);font-size:10px}
#add-modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(480px,92vw);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;z-index:30;display:none;box-shadow:0 20px 60px rgba(0,0,0,.9)}
#add-modal h3{font-size:14px;color:var(--cross);margin-bottom:14px;font-family:'Space Mono',monospace}
.modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer}
.f-label{font-size:11px;color:var(--text-dim);margin-bottom:5px;font-weight:500}
.f-group{margin-bottom:12px}
textarea#prob-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;resize:vertical;min-height:80px;line-height:1.6}
textarea#prob-input:focus{outline:none;border-color:var(--cross)}
.result-toggle{display:flex;gap:8px}
.r-btn{flex:1;border-radius:8px;padding:7px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid;background:var(--surface2);transition:all .15s}
.r-btn.correct{border-color:var(--mastered);color:var(--mastered)}.r-btn.wrong{border-color:var(--weak);color:var(--weak)}.r-btn.unknown{border-color:var(--border);color:var(--text-dim)}
.r-btn.active{color:#000!important}
.r-btn.correct.active{background:var(--mastered)}.r-btn.wrong.active{background:var(--weak)}.r-btn.unknown.active{background:var(--unset)}
#ai-area{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;display:none}
.ai-lbl{font-size:10px;color:var(--cross);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.ai-tags{display:flex;flex-wrap:wrap;gap:6px}
.ai-tag{background:rgba(253,230,138,.1);border:1px solid var(--cross);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--cross);cursor:pointer;font-weight:600;transition:all .15s}
.ai-tag:hover,.ai-tag.selected{background:var(--cross);color:#000}
.ai-reason{font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:7px 18px;font-size:12px;font-family:inherit;cursor:pointer}
.btn-save{background:var(--cross);border:none;color:#000;border-radius:8px;padding:7px 18px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-save:disabled{opacity:.4;cursor:default}
#legend{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.92);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;gap:5px;backdrop-filter:blur(6px);font-size:11px}
.lg-row{display:flex;align-items:center;gap:7px;color:var(--text-dim)}
.lg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:2px solid}
.lg-line{width:22px;height:3px;border-radius:2px;flex-shrink:0}
.lg-sec{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
#stats-bar{position:absolute;top:8px;right:8px;display:flex;gap:5px;flex-wrap:wrap}
.stat-chip{background:rgba(0,0,0,.9);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text-dim)}
.stat-chip b{color:var(--text)}
#prob-popup{position:fixed;background:rgba(0,0,0,.97);border:1px solid var(--cross);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text);pointer-events:none;z-index:100;display:none;max-width:260px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.8)}
.pp-res{font-size:11px;font-weight:700;margin-bottom:3px}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:10;display:none}
.tooltip{position:absolute;background:rgba(0,0,0,.95);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text);pointer-events:none;z-index:50;display:none;max-width:230px;line-height:1.6}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.qm-choice{background:#000;border:1.5px solid #2a2a2a;border-radius:10px;padding:11px 16px;font-size:13px;color:#e2e8f0;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;width:100%}
.qm-choice:hover:not(:disabled){border-color:var(--cross);color:var(--cross)}
.qm-choice.correct{border-color:var(--mastered);background:rgba(34,211,160,.1);color:var(--mastered)}
.qm-choice.wrong{border-color:var(--weak);background:rgba(244,63,94,.1);color:var(--weak)}
.qm-choice:disabled{cursor:default}
</style>
</head>
<body>
<header>
  <div class="logo">4教科 <span>✦</span> KNOWLEDGE MAP</div>
  <div class="controls">
    <div class="subj-chips">
      <button class="subj-chip all active" onclick="setFilter('all')">全体</button>
      <button class="subj-chip math" onclick="setFilter('math')">算数</button>
      <button class="subj-chip lang" onclick="setFilter('lang')">国語</button>
      <button class="subj-chip sci"  onclick="setFilter('sci')">理科</button>
      <button class="subj-chip soc"  onclick="setFilter('soc')">社会</button>
    </div>
    <label class="cross-toggle">
      <input type="checkbox" id="cross-toggle" checked onchange="toggleCross()">
      <span style="color:var(--cross)">✦</span> 教科横断
    </label>
    <button class="hdr-btn" onclick="openCurriculum()" style="border-color:#818cf8;color:#818cf8">📅 カリキュラム</button>
    <button class="hdr-btn primary" onclick="openAddModal()">＋ 問題を追加</button>
  </div>
</header>
<main>
  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="stats-bar"></div>
    <div id="legend">
      <div class="lg-sec">教科</div>
      <div class="lg-row"><div class="lg-dot" style="background:#0f2a38;border-color:var(--math)"></div>算数</div>
      <div class="lg-row"><div class="lg-dot" style="background:#1e1030;border-color:var(--lang)"></div>国語</div>
      <div class="lg-row"><div class="lg-dot" style="background:#0a2018;border-color:var(--sci)"></div>理科</div>
      <div class="lg-row"><div class="lg-dot" style="background:#251408;border-color:var(--soc)"></div>社会</div>
      <div class="lg-sec">習熟度</div>
      <div class="lg-row"><div class="lg-line" style="background:var(--mastered)"></div>定着（光輪）</div>
      <div class="lg-row"><div class="lg-line" style="background:var(--weak)"></div>苦手（赤枠）</div>
      <div class="lg-sec">リンク</div>
      <div class="lg-row"><div class="lg-line" style="background:var(--cross)"></div>教科横断 ✦</div>
      <div class="lg-sec">問題ドット</div>
      <div class="lg-row"><svg width="10" height="10" style="flex-shrink:0"><circle cx="5" cy="5" r="4" fill="var(--mastered)"/></svg>正解</div>
      <div class="lg-row"><svg width="10" height="10" style="flex-shrink:0"><line x1="1" y1="1" x2="9" y2="9" stroke="var(--weak)" stroke-width="2.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="var(--weak)" stroke-width="2.5" stroke-linecap="round"/></svg>不正解</div>
      <div class="lg-row"><svg width="10" height="10" style="flex-shrink:0"><path d="M5,1L9,5L5,9L1,5Z" fill="var(--text-dim)"/></svg>未採点</div>
    </div>
  </div>
  <div id="sidebar" class="collapsed">
    <div class="sb-header">
      <span class="sb-title" id="sb-title">—</span>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sb-body" id="sb-body"></div>
  </div>
</main>
<div id="overlay" onclick="closeAllModals()"></div>
<div id="add-modal">
  <button class="modal-close" onclick="closeAllModals()">✕</button>
  <h3>＋ 問題を追加</h3>
  <div class="f-group">
    <div class="f-label">問題文（AIが4教科の単元を自動判定）</div>
    <textarea id="prob-input" placeholder="例：AとBが同じ地点から同時に出発して…&#10;例：下線部の漢字の読みを答えなさい…&#10;例：てこの左端から20cmの位置に…&#10;例：江戸幕府が定めた参勤交代とは…" rows="4" oninput="onProbInput()"></textarea>
  </div>
  <div class="f-group">
    <div class="f-label">結果</div>
    <div class="result-toggle">
      <button class="r-btn correct" onclick="setResult('correct')">○ 正解</button>
      <button class="r-btn wrong active" onclick="setResult('wrong')">✕ 不正解</button>
      <button class="r-btn unknown" onclick="setResult('unknown')">― 未採点</button>
    </div>
  </div>
  <div id="ai-area">
    <div class="ai-lbl">✦ AI 単元判定（4教科）</div>
    <div><span id="ai-spinner" style="font-size:12px;color:var(--text-dim)">判定中…</span></div>
    <div class="ai-tags" id="ai-tags"></div>
    <div class="ai-reason" id="ai-reason"></div>
  </div>
  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeAllModals()">キャンセル</button>
    <button class="btn-save" id="btn-save" onclick="saveProblem()" disabled>追加する</button>
  </div>
</div>
<div id="prob-popup"></div>
<div class="tooltip" id="tooltip"></div>

<script>
/* ══════════ FULL NODE DATA ══════════ */
const NODES = [
  // ── 算数 ──
  {id:'m01',label:'整数・小数計算',   cat:'math',group:'数と計算',  critical:true},
  {id:'m02',label:'分数の計算',       cat:'math',group:'数と計算',  critical:true},
  {id:'m03',label:'四則混合計算',     cat:'math',group:'数と計算',  critical:true},
  {id:'m04',label:'約数・倍数',       cat:'math',group:'数と計算',  critical:true},
  {id:'m05',label:'素因数分解',       cat:'math',group:'数と計算'},
  {id:'m06',label:'余りの計算・周期', cat:'math',group:'数と計算'},
  {id:'m07',label:'割合の基本',       cat:'math',group:'割合・比',  critical:true},
  {id:'m08',label:'百分率・歩合',     cat:'math',group:'割合・比'},
  {id:'m09',label:'比の基本',         cat:'math',group:'割合・比',  critical:true},
  {id:'m10',label:'比の応用',         cat:'math',group:'割合・比'},
  {id:'m11',label:'売買損益',         cat:'math',group:'割合・比'},
  {id:'m12',label:'速さの基本',       cat:'math',group:'速さ',      critical:true},
  {id:'m13',label:'旅人算',           cat:'math',group:'速さ',      critical:true},
  {id:'m14',label:'通過算・流水算',   cat:'math',group:'速さ'},
  {id:'m15',label:'時計算',           cat:'math',group:'速さ'},
  {id:'m16',label:'平面図形の基本',   cat:'math',group:'図形',      critical:true},
  {id:'m17',label:'面積の計算',       cat:'math',group:'図形',      critical:true},
  {id:'m18',label:'相似・縮図',       cat:'math',group:'図形',      critical:true},
  {id:'m19',label:'円・おうぎ形',     cat:'math',group:'図形'},
  {id:'m20',label:'立体図形・体積',   cat:'math',group:'図形'},
  {id:'m21',label:'鶴亀算',           cat:'math',group:'文章題',    critical:true},
  {id:'m22',label:'差集め算',         cat:'math',group:'文章題'},
  {id:'m23',label:'仕事算',           cat:'math',group:'文章題'},
  {id:'m24',label:'濃度',             cat:'math',group:'文章題'},
  {id:'m25',label:'ニュートン算',     cat:'math',group:'文章題'},
  {id:'m26',label:'植木算・数列',     cat:'math',group:'規則性'},
  {id:'m27',label:'周期・規則性',     cat:'math',group:'規則性'},
  {id:'m28',label:'場合の数',         cat:'math',group:'規則性',    critical:true},
  {id:'m29',label:'統計・グラフ',     cat:'math',group:'データ'},
  // ── 国語 ──
  {id:'l01',label:'漢字の読み書き',   cat:'lang',group:'言語知識',  critical:true},
  {id:'l02',label:'語彙・慣用句',     cat:'lang',group:'言語知識',  critical:true},
  {id:'l03',label:'ことわざ・故事成語',cat:'lang',group:'言語知識'},
  {id:'l04',label:'文法・品詞',       cat:'lang',group:'言語知識'},
  {id:'l05',label:'敬語',             cat:'lang',group:'言語知識'},
  {id:'l06',label:'指示語・接続語',   cat:'lang',group:'読解基礎',  critical:true},
  {id:'l07',label:'段落構造の把握',   cat:'lang',group:'読解基礎',  critical:true},
  {id:'l08',label:'主題・要旨',       cat:'lang',group:'読解基礎',  critical:true},
  {id:'l09',label:'説明文読解',       cat:'lang',group:'読解応用',  critical:true},
  {id:'l10',label:'物語文読解',       cat:'lang',group:'読解応用',  critical:true},
  {id:'l11',label:'心情把握',         cat:'lang',group:'読解応用',  critical:true},
  {id:'l12',label:'詩・短歌・俳句',   cat:'lang',group:'韻文'},
  {id:'l13',label:'古文・漢文の基礎', cat:'lang',group:'韻文'},
  {id:'l14',label:'理由・根拠説明',   cat:'lang',group:'記述',      critical:true},
  {id:'l15',label:'字数制限作文',     cat:'lang',group:'記述'},
  // ── 理科 ──
  {id:'s01',label:'植物のつくり・光合成',cat:'sci',group:'生物'},
  {id:'s02',label:'動物・人体のしくみ',  cat:'sci',group:'生物'},
  {id:'s03',label:'生態系・食物連鎖',    cat:'sci',group:'生物'},
  {id:'s04',label:'てこ・滑車・輪軸',    cat:'sci',group:'物理',  critical:true},
  {id:'s05',label:'電流・回路・磁石',    cat:'sci',group:'物理',  critical:true},
  {id:'s06',label:'光・音・熱',          cat:'sci',group:'物理'},

function probsFor(id){return problems.filter(p=>p.nodeId===id)}
function deriveStatus(id){
  const ps=problems.filter(p=>p.nodeId===id);
  if(!ps.length)return nodeStatus[id]||'unset';
  const cor=ps.filter(p=>p.result==='correct').length;
  const wr=ps.filter(p=>p.result==='wrong').length;
  if(cor/ps.length>=0.7)return'mastered';
  if(wr/ps.length>=0.5)return'weak';
  return'learning';
}


/* ══════════ MASTERY COLOR ══════════ */
const BASE_FILL = {math:'#0f2a38',lang:'#1e1030',sci:'#0a2018',soc:'#251408'};
const BASE_STROKE = {math:'#38bdf8',lang:'#a78bfa',sci:'#34d399',soc:'#fb923c'};
// Mastery levels → progressively more saturated/bright fill
function masteryFill(d) {
  const st = deriveStatus(d.id);
  if(st==='unset') return '#1a1a1a'; // full gray until touched
  const fills = {
    math: {weak:'#1a3a50',learning:'#1e5a78',mastered:'#1a7aaa'},
    lang: {weak:'#2d1a50',learning:'#3d2070',mastered:'#5a30a0'},
    sci:  {weak:'#123828',learning:'#1a5038',mastered:'#1e7848'},
    soc:  {weak:'#3a2010',learning:'#502c14',mastered:'#7a4018'},
  };
  return fills[d.cat]?.[st] || '#1a1a1a';
}
function masteryStroke(d) {
  const st = deriveStatus(d.id);
  if(st==='unset') return '#333';
  if(st==='weak') return 'var(--weak)';
  if(st==='mastered') return 'var(--mastered)';
  if(st==='learning') return {math:'#60d0ff',lang:'#c4a8ff',sci:'#5ef5c0',soc:'#ffb060'}[d.cat] || BASE_STROKE[d.cat];
  return BASE_STROKE[d.cat];
}
function masteryPct(id) {
  const ps = problems.filter(p=>p.nodeId===id);
  if(!ps.length) return 0;
  return ps.filter(p=>p.result==='correct').length / ps.length;
}

/* ══════════ GRAPH ══════════ */
let simulation;
function buildGraph(){
  const cont=document.getElementById('graph-container');
  const W=cont.clientWidth,H=cont.clientHeight;
  d3.select('#graph').selectAll('*').remove();
  const svgEl=d3.select('#graph').attr('viewBox',`0 0 ${W} ${H}`);

  // Background rect — ensures black even in iframe
  svgEl.append('rect').attr('width',W).attr('height',H).attr('fill','#000');

  const defs=svgEl.append('defs');
  ['math','lang','sci','soc','cross'].forEach(t=>{
    const col=t==='cross'?'#fde68a':t==='math'?'#38bdf8':t==='lang'?'#a78bfa':t==='sci'?'#34d399':'#fb923c';
    defs.append('marker').attr('id',`arr-${t}`)
      .attr('viewBox','0 -4 8 8').attr('refX',22).attr('refY',0)
      .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',col);
  });

  const g=svgEl.append('g');
  svgEl.call(d3.zoom().scaleExtent([.1,5]).on('zoom',e=>g.attr('transform',e.transform)));

  const visIds=currentFilter==='all'?new Set(NODES.map(n=>n.id)):new Set(NODES.filter(n=>n.cat===currentFilter).map(n=>n.id));
  const nodes=NODES.filter(n=>visIds.has(n.id)).map(n=>({...n}));
  const nodeMap=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const links=EDGES.filter(e=>visIds.has(e.s)&&visIds.has(e.t)&&(showCross||!e.cross)).map(e=>({...e,source:e.s,target:e.t}));

  const sc={math:{x:W*.25,y:H*.28},lang:{x:W*.75,y:H*.28},sci:{x:W*.25,y:H*.72},soc:{x:W*.75,y:H*.72}};
  nodes.forEach(n=>{const c=sc[n.cat]||{x:W/2,y:H/2};n.x=c.x+(Math.random()-.5)*140;n.y=c.y+(Math.random()-.5)*140});

  simulation=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.cross?200:80).strength(d=>d.cross?.08:.4))
    .force('charge',d3.forceManyBody().strength(-220).distanceMax(300))
    .force('collision',d3.forceCollide(32))
    .force('x',d3.forceX(n=>sc[n.cat]?.x||W/2).strength(.07))
    .force('y',d3.forceY(n=>sc[n.cat]?.y||H/2).strength(.07))
    .alphaDecay(0.015)
    .velocityDecay(0.35);
  // gentle idle drift
  function idleDrift(){
    if(simulation.alpha()<0.01){
      simulation.alpha(0.03).restart();
    }
    setTimeout(idleDrift, 4000);
  }
  setTimeout(idleDrift, 3000);

  const linkSel=g.append('g').selectAll('line').data(links).enter().append('line')
    .attr('class',d=>`link${d.cross?' cross':''}`)
    .attr('stroke',d=>d.cross?'var(--cross)':SC[nodeMap[d.s]?.cat]||'#444')
    .attr('marker-end',d=>`url(#arr-${d.cross?'cross':nodeMap[d.s]?.cat||'math'})`);

  const nodeSel=g.append('g').selectAll('g').data(nodes).enter().append('g')
    .attr('class',d=>`node status-${deriveStatus(d.id)} cat-${d.cat}`)
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}))
    .on('click',(e,d)=>{e.stopPropagation();focusNode(d);if(deriveStatus(d.id)==='unset')previewUnlock(d);openSidebar(d)})
    .on('mousemove',showTooltip).on('mouseleave',hideTooltip);

  nodeSel.append('circle').attr('r',d=>d.critical?17:13)
    .attr('fill', d => masteryFill(d))
    .attr('stroke', d => masteryStroke(d))
    .attr('stroke-width', d => deriveStatus(d.id)==='weak'?3:2);

  // subject label inside node
  nodeSel.append('text').attr('y',1).attr('font-size',8).attr('font-weight',700)
    .attr('fill','rgba(255,255,255,.6)').text(d=>({math:'算',lang:'国',sci:'理',soc:'社'})[d.cat]);

  // problem dots
  nodeSel.each(function(d){
    const ps=probsFor(d.id);if(!ps.length)return;
    const orbit=(d.critical?17:13)+14;
    ps.forEach((p,i)=>{
      const angle=(2*Math.PI/ps.length)*i-Math.PI/2+(Math.random()-.5)*.5;
      const dist=orbit+(Math.random()-.5)*7;
      const dg=d3.select(this).append('g').attr('class','prob-dot')
        .attr('transform',`translate(${Math.cos(angle)*dist},${Math.sin(angle)*dist})`)
        .style('cursor','pointer')
        .on('click',e=>{e.stopPropagation();showProbPopup(p,e.pageX,e.pageY)})
        .on('mousemove',e=>{e.stopPropagation();showProbPopup(p,e.pageX,e.pageY)})
        .on('mouseleave',hideProbPopup);
      if(p.result==='correct'){
        dg.append('circle').attr('r',4).attr('fill','var(--mastered)').attr('stroke','rgba(0,0,0,.5)').attr('stroke-width',1);
      }else if(p.result==='wrong'){
        const s=3.8;
        dg.append('line').attr('x1',-s).attr('y1',-s).attr('x2',s).attr('y2',s).attr('stroke','var(--weak)').attr('stroke-width',2.5).attr('stroke-linecap','round');
        dg.append('line').attr('x1',s).attr('y1',-s).attr('x2',-s).attr('y2',s).attr('stroke','var(--weak)').attr('stroke-width',2.5).attr('stroke-linecap','round');
      }else{
        dg.append('path').attr('d','M0,-5L4.5,0L0,5L-4.5,0Z').attr('fill','var(--text-dim)');
      }
    });
  });

  // node label with outline stroke
  nodeSel.append('text').attr('y',d=>(d.critical?17:13)+13).attr('font-size',10).attr('font-weight',500)
    .attr('fill','#f1f5f9').attr('paint-order','stroke')
    .attr('stroke','#000').attr('stroke-width','3').attr('stroke-linejoin','round')
    .text(d=>d.label.length>8?d.label.slice(0,7)+'…':d.label);

  simulation.on('tick',()=>{
    linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
  updateStats(nodes);
}

function updateStats(nodes){
  const mastered=nodes.filter(n=>deriveStatus(n.id)==='mastered').length;
  const weak=nodes.filter(n=>deriveStatus(n.id)==='weak').length;
  const plotted=nodes.filter(n=>probsFor(n.id).length>0).length;
  const crossN=EDGES.filter(e=>e.cross).length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-chip">単元 <b>${nodes.length}</b></div>
    <div class="stat-chip">定着 <b style="color:var(--mastered)">${mastered}</b></div>
    <div class="stat-chip">苦手 <b style="color:var(--weak)">${weak}</b></div>
    <div class="stat-chip">問題 <b>${problems.length}</b></div>
    <div class="stat-chip" style="color:var(--cross)">横断 <b>${crossN}</b>本</div>`;
}


/* ══════════ FOCUS ══════════ */
function focusNode(d) {
  const svgEl = d3.select('#graph');
  const cont = document.getElementById('graph-container');
  const W = cont.clientWidth, H = cont.clientHeight;
  const scale = 1.8;
  const tx = W/2 - d.x * scale;
  const ty = H/2 - d.y * scale;
  svgEl.transition().duration(600).ease(d3.easeCubicInOut)
    .call(d3.zoom().transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  // pulse ring
  const g = svgEl.select('g');
  const pulse = g.append('circle')
    .attr('cx', d.x).attr('cy', d.y)
    .attr('r', d.critical?17:13)
    .attr('fill','none')
    .attr('stroke','var(--cross)')
    .attr('stroke-width', 2)
    .attr('opacity', 0.9);
  pulse.transition().duration(700).ease(d3.easeExpOut)
    .attr('r', d.critical?50:40)
    .attr('opacity', 0)
    .remove();
}

    if(n){aiSelTag=nodeId;document.getElementById('ai-area').style.display='block';document.getElementById('ai-spinner').style.display='none';document.getElementById('ai-tags').innerHTML=`<div class="ai-tag selected">${n.label}（${SL[n.cat]}）</div>`;document.getElementById('ai-reason').textContent='単元指定済み';document.getElementById('btn-save').disabled=false}
  }
  document.getElementById('overlay').style.display='block';
  document.getElementById('add-modal').style.display='block';
  setTimeout(()=>document.getElementById('prob-input').focus(),100);
}
function setResult(r){
  curResult=r;
  document.querySelectorAll('.r-btn').forEach(b=>b.classList.toggle('active',b.classList.contains(r)));
}
function onProbInput(){
  const text=document.getElementById('prob-input').value.trim();
  if(presetNodeId)return;
  clearTimeout(aiDebounce);
  if(text.length<10){document.getElementById('ai-area').style.display='none';document.getElementById('btn-save').disabled=true;aiSelTag=null;return}
  document.getElementById('ai-area').style.display='block';
  document.getElementById('ai-spinner').style.display='block';
  document.getElementById('ai-tags').innerHTML='';
  document.getElementById('ai-reason').textContent='';
  document.getElementById('btn-save').disabled=true;aiSelTag=null;
  aiDebounce=setTimeout(()=>classify(text),700);
}
async function classify(text){
  const cid=++aiN;
  const nodeList=NODES.map(n=>`${n.id}: ${n.label}（${SL[n.cat]}, ${n.group}）`).join('\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        system:`あなたは中学受験の問題を4教科の単元に分類する専門家です。以下の単元リストから最もあてはまるものを1〜3個選んでください。必ずJSON形式のみで返してください。他の文字は含めないでください。\n\n単元リスト:\n${nodeList}\n\n返答形式:\n{"matches":[{"id":"単元ID","label":"単元名"}],"reason":"判定理由（20字以内）"}`,
        messages:[{role:'user',content:`次の問題を分類してください:\n\n${text}`}]})});
    if(cid!==aiN)return;
    const data=await res.json();
    const raw=data.content?.[0]?.text||'{}';
    let parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim())}catch{parsed={matches:[],reason:'判定失敗'}}
    document.getElementById('ai-spinner').style.display='none';
    document.getElementById('ai-reason').textContent=parsed.reason||'';
    const tagsEl=document.getElementById('ai-tags');tagsEl.innerHTML='';
    (parsed.matches||[]).forEach((m,i)=>{
      const n=NODES.find(x=>x.id===m.id);if(!n)return;
      const btn=document.createElement('div');btn.className='ai-tag'+(i===0?' selected':'');
      btn.textContent=`${m.label}（${SL[n.cat]}）`;
      if(i===0)aiSelTag=m.id;
      btn.onclick=()=>{document.querySelectorAll('.ai-tag').forEach(t=>t.classList.remove('selected'));btn.classList.add('selected');aiSelTag=m.id;document.getElementById('btn-save').disabled=false};
      tagsEl.appendChild(btn);
    });
    if(parsed.matches?.length)document.getElementById('btn-save').disabled=false;
  }catch{if(cid!==aiN)return;document.getElementById('ai-spinner').style.display='none';document.getElementById('ai-reason').textContent='接続エラー'}
}
function saveProblem(){
  const text=document.getElementById('prob-input').value.trim();
  if(!aiSelTag)return alert('単元を選択してください');
  problems.push({id:Date.now(),nodeId:aiSelTag,text:text||'(問題文なし)',result:curResult,date:new Date().toISOString()});
  saveProbs();closeAllModals();buildGraph();
  const n=NODES.find(x=>x.id===aiSelTag);if(n)openSidebar(n);
}

/* ══════════ POPUP / TOOLTIP ══════════ */
function showProbPopup(p,px,py){
  const ri={correct:'○ 正解',wrong:'✕ 不正解',unknown:'― 未採点'};
  const rc={correct:'var(--mastered)',wrong:'var(--weak)',unknown:'var(--text-dim)'};
  const n=NODES.find(x=>x.id===p.nodeId);
  const el=document.getElementById('prob-popup');
  el.innerHTML=`<div class="pp-res" style="color:${rc[p.result]}">${ri[p.result]}</div><b style="color:${SC[n?.cat]||'var(--text)'}">${n?.label||''}</b><br><span style="color:var(--text-dim);font-size:11px">${p.text.slice(0,100)}${p.text.length>100?'…':''}</span><br><span style="font-size:10px;color:var(--text-dim)">${new Date(p.date).toLocaleDateString('ja-JP')}</span>`;
  el.style.display='block';
  const vw=window.innerWidth,vh=window.innerHeight;
  let x=px+16,y=py-10;
  if(x+270>vw)x=px-285;if(y+120>vh)y=py-130;
  el.style.left=x+'px';el.style.top=y+'px';
}
function hideProbPopup(){document.getElementById('prob-popup').style.display='none'}
function showTooltip(e,d){
  const st=deriveStatus(d.id),cnt=probsFor(d.id).length,cor=probsFor(d.id).filter(p=>p.result==='correct').length;
  const sl={mastered:'定着済み',learning:'学習中',weak:'苦手',unset:'未設定'};
  const t=document.getElementById('tooltip');
  t.style.display='block';t.style.left=(e.pageX+14)+'px';t.style.top=(e.pageY-10)+'px';
  t.innerHTML=`<b style="color:${SC[d.cat]}">[${SL[d.cat]}]</b> ${d.label}<br>${d.group} | ${sl[st]}`+(cnt?`<br>問題: ${cnt}問（正答${cor}）`:'');
}
function hideTooltip(){document.getElementById('tooltip').style.display='none'}
function closeAllModals(){document.getElementById('overlay').style.display='none';document.getElementById('add-modal').style.display='none';presetNodeId=null}

// Quiz state
let qState = { nodeId:null, questions:[], idx:0, score:0, answered:false };

function openQuiz(nodeId) {
  const nd = NODES.find(x=>x.id===nodeId);
  if(!nd) return;
  const cur = MATH_CURRICULUM[nodeId];
  let qs = [];
  if(cur) {
    qs = cur.questions;
  }
  // For non-math or missing: generate via AI (show loading)
  qState = { nodeId, questions: qs, idx:0, score:0, answered:false, aiMode:!cur, principle: cur?.principle||null };
  document.getElementById('qm-subj').textContent = '[' + SL[nd.cat] + '] ' + nd.group;
  document.getElementById('qm-subj').style.color = SC[nd.cat];
  document.getElementById('qm-title').textContent = nd.label;
  document.getElementById('qm-principle').textContent = cur ? cur.principle : '原理原則を読み込み中…';
  document.getElementById('overlay').style.display='block';
  document.getElementById('quiz-modal').style.display='block';
  if(!cur) {
    generateQuizAI(nd);
  } else {
    renderQuizQuestion();
  }
}

async function generateQuizAI(nd) {
  document.getElementById('qm-q').textContent = 'AIが問題を生成中…';
  document.getElementById('qm-choices').innerHTML = '';
  document.getElementById('qm-feedback').style.display='none';
  document.getElementById('qm-next-btn').style.display='none';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        system:`あなたは中学受験の専門家です。指定された単元について、原理原則の説明（100字以内）と確認問題3問（4択）を作成してください。必ずJSON形式のみで返してください。\n\n{"principle":"原理原則の説明","questions":[{"q":"問題文","c":["選択肢1","選択肢2","選択肢3","選択肢4"],"a":正解のインデックス(0-3)}]}`,
        messages:[{role:'user',content:`単元：${nd.label}（${SL[nd.cat]}・${nd.group}）\n6年夏休みまでに習得すべき基礎力を確認する問題を3問作成してください。`}]})});
    const data = await res.json();
    const raw = data.content?.[0]?.text||'{}';
    let parsed; try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim())}catch{parsed=null}
    if(parsed?.questions?.length) {
      qState.questions = parsed.questions;
      qState.principle = parsed.principle;
      document.getElementById('qm-principle').textContent = parsed.principle;
      renderQuizQuestion();
    } else {
      document.getElementById('qm-q').textContent = '問題の生成に失敗しました。再度お試しください。';
    }
  } catch(e) {
    document.getElementById('qm-q').textContent = '接続エラー。ネットワークを確認してください。';
  }
}

function renderQuizQuestion() {
  const {questions, idx, score} = qState;
  const total = questions.length;
  qState.answered = false;
  // progress
  document.getElementById('qm-progress').textContent = `問題 ${idx+1} / ${total}`;
  document.getElementById('qm-bar').style.width = ((idx+1)/total*100)+'%';
  document.getElementById('qm-score-badge').textContent = `${score} / ${idx}`;
  document.getElementById('qm-feedback').style.display='none';
  document.getElementById('qm-next-btn').style.display='none';
  document.getElementById('qm-finish-btn').style.display='none';
  document.getElementById('qm-result-summary').textContent='';
  const q = questions[idx];
  document.getElementById('qm-q').textContent = q.q;
  const choicesEl = document.getElementById('qm-choices');
  choicesEl.innerHTML = '';
  q.c.forEach((ch,i)=>{
    const btn = document.createElement('button');
    btn.className = 'qm-choice';
    btn.textContent = ['①','②','③','④'][i] + ' ' + ch;
    btn.onclick = () => answerQuiz(i);
    choicesEl.appendChild(btn);
  });
}

function answerQuiz(chosen) {
  if(qState.answered) return;
  qState.answered = true;
  const q = qState.questions[qState.idx];
  const correct = chosen === q.a;
  if(correct) qState.score++;
  // color choices
  const btns = document.querySelectorAll('.qm-choice');
  btns.forEach((b,i)=>{
    b.disabled = true;
    if(i===q.a) b.classList.add('correct');
    else if(i===chosen && !correct) b.classList.add('wrong');
  });
  // feedback
  const fb = document.getElementById('qm-feedback');
  fb.style.display='block';
  if(correct) {
    fb.style.background='rgba(34,211,160,.08)';fb.style.border='1px solid var(--mastered)';fb.style.color='var(--mastered)';
    fb.textContent='✓ 正解！';
  } else {
    fb.style.background='rgba(244,63,94,.08)';fb.style.border='1px solid var(--weak)';fb.style.color='#f1f5f9';
    fb.innerHTML='✗ 不正解。正解は <b style="color:var(--mastered)">'+['①','②','③','④'][q.a]+' '+q.c[q.a]+'</b>';
  }
  document.getElementById('qm-score-badge').textContent = `${qState.score} / ${qState.idx+1}`;
  // next or finish
  if(qState.idx < qState.questions.length-1) {
    document.getElementById('qm-next-btn').style.display='block';
  } else {
    // done — save result & show summary
    saveQuizResult();
    const pct = Math.round(qState.score/qState.questions.length*100);
    document.getElementById('qm-result-summary').innerHTML = `<span style="font-size:14px;font-weight:700;color:${pct>=70?'var(--mastered)':pct>=40?'var(--learning)':'var(--weak)'}">${pct}%</span> <span style="color:#64748b">（${qState.score}/${qState.questions.length}正解）</span>`;
    document.getElementById('qm-finish-btn').style.display='block';
  }
}

function quizNext() {
  qState.idx++;
  renderQuizQuestion();
}

function saveQuizResult() {
  const {nodeId, questions, score} = qState;
  const pct = score / questions.length;
  const prevStatus = deriveStatus(nodeId);
  problems.push({
    id: Date.now(),
    nodeId,
    text: `確認テスト（${questions.length}問・${Math.round(pct*100)}%正解）`,
    result: pct >= 0.7 ? 'correct' : pct >= 0.4 ? 'unknown' : 'wrong',
    date: new Date().toISOString(),
    isQuiz: true,
    quizScore: score,
    quizTotal: questions.length,
  });
  saveProbs();
  buildGraph();
  const newStatus = deriveStatus(nodeId);
  // fire unlock animation if status improved
  if(prevStatus === 'unset' || (prevStatus==='weak' && newStatus!=='weak') || newStatus==='mastered') {
    setTimeout(()=>unlockAnimate(nodeId, newStatus), 400);
  }
}

function unlockAnimate(nodeId, status) {
  const nd = NODES.find(x=>x.id===nodeId);
  if(!nd) return;
  const g = d3.select('#graph').select('g');
  const col = status==='mastered'?'var(--mastered)':status==='weak'?'var(--weak)':'var(--learning)';
  // burst ripple rings x3
  [0,150,300].forEach(delay=>{
    setTimeout(()=>{
      const r = g.append('circle')
        .attr('cx',nd.x).attr('cy',nd.y)
        .attr('r',nd.critical?17:13)
        .attr('fill','none')
        .attr('stroke',col)
        .attr('stroke-width',2.5)
        .attr('pointer-events','none');
      r.transition().duration(900).ease(d3.easeExpOut)
        .attr('r',60).attr('stroke-opacity',0).attr('stroke-width',.5).remove();
    }, delay);
  });
  // chain: light up downstream nodes sequentially
  const downstream = LINKS
    .filter(l=>(l.source.id||l.source)===nodeId)
    .map(l=>l.target.id||l.target);
  downstream.forEach((tid,i)=>{
    setTimeout(()=>chainPulse(tid), 500 + i*220);
  });
}

function chainPulse(nodeId) {
  const nd = NODES.find(x=>x.id===nodeId);
  if(!nd) return;
  const g = d3.select('#graph').select('g');
  const ndEl = d3.selectAll('.node').filter(d=>d.id===nodeId);
  // flash the node
  ndEl.select('circle')
    .transition().duration(200).attr('fill','#ffffff').attr('stroke-opacity',1)
    .transition().duration(600).attr('fill', masteryFill(nd)).attr('stroke-opacity',.8);
  // small ripple
  const r = g.append('circle')
    .attr('cx',nd.x).attr('cy',nd.y)
    .attr('r',nd.critical?17:13)
    .attr('fill','none').attr('stroke','#fff')
    .attr('stroke-width',1.5).attr('stroke-opacity',.6)
    .attr('pointer-events','none');
  r.transition().duration(700).ease(d3.easeExpOut)
    .attr('r',40).attr('stroke-opacity',0).remove();
}

function closeQuiz() {
  document.getElementById('quiz-modal').style.display='none';
  document.getElementById('overlay').style.display='none';
  // reopen sidebar if node was selected
  if(qState.nodeId) { const n=NODES.find(x=>x.id===qState.nodeId); if(n) openSidebar(n); }
}

let drawCtx=null, drawActive=false, drawColor='#f1f5f9', drawLast=null;
function initCanvas(){
  const cv=document.getElementById('draw-canvas');
  if(!cv)return;
  const dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr; cv.height=140*dpr;
  drawCtx=cv.getContext('2d');
  drawCtx.scale(dpr,dpr);
  drawCtx.lineCap='round';drawCtx.lineJoin='round';drawCtx.lineWidth=2;
  drawCtx.strokeStyle='#f1f5f9';
  const pos=(e)=>{
    const r=cv.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left),y:(t.clientY-r.top)};
  };
  const start=(e)=>{e.preventDefault();drawActive=true;drawLast=pos(e);drawCtx.beginPath();drawCtx.moveTo(drawLast.x,drawLast.y)};
  const move=(e)=>{
    if(!drawActive)return;e.preventDefault();
    const p=pos(e);
    if(drawColor==='eraser'){drawCtx.clearRect(p.x-12,p.y-12,24,24)}
    else{drawCtx.strokeStyle=drawColor;drawCtx.lineWidth=2;drawCtx.lineTo(p.x,p.y);drawCtx.stroke();drawCtx.beginPath();drawCtx.moveTo(p.x,p.y);}
    drawLast=p;
  };
  const end=()=>{drawActive=false;drawCtx.beginPath()};
  cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
  cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end);
}
function setDrawColor(c){
  drawColor=c;
  document.getElementById('dc-pen').style.borderColor=c==='eraser'?'transparent':'var(--cross)';
}
function clearCanvas(){const cv=document.getElementById('draw-canvas');if(cv&&drawCtx)drawCtx.clearRect(0,0,cv.width,cv.height);}

// init canvas when quiz opens
const _origOpenQuiz = openQuiz;
openQuiz = function(nodeId){
  _origOpenQuiz(nodeId);
  setTimeout(()=>{initCanvas();clearCanvas();},100);
};

let currTab='math';
function openCurriculum(){
  document.getElementById('overlay').style.display='block';
  document.getElementById('curr-modal').style.display='block';
  renderCurriculum();
}
function closeCurriculum(){
  document.getElementById('curr-modal').style.display='none';
  document.getElementById('overlay').style.display='none';
}
function setCurrTab(cat){
  currTab=cat;
  document.querySelectorAll('.curr-tab').forEach(b=>{
    const isCat=b.getAttribute('onclick').includes("'"+cat+"'");
    b.style.background=isCat?`var(--${cat})`:'transparent';
    b.style.color=isCat?'#000':`var(--${cat})`;
  });
  renderCurriculum();
}
function renderCurriculum(){
  const weeks=CURRICULUM[currTab]||[];
  const SC2={math:'var(--math)',lang:'var(--lang)',sci:'var(--sci)',soc:'var(--soc)'};
  const col=SC2[currTab];

  // group by grade
  const gradeOrder = ['4年上','4年下','5年上','5年下','6年上','6年下'];
  const byGrade = {};
  weeks.forEach(w => {
    if(!byGrade[w.grade]) byGrade[w.grade] = [];
    byGrade[w.grade].push(w);
  });
  let html = '';
  gradeOrder.forEach(grade => {
    if(!byGrade[grade]) return;
    html += `<div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #1a1a1a">${grade}</div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:7px;margin-bottom:4px">';
  weeks.forEach(w=>{
    // check mastery of related nodes
    const nodeStatuses=w.nodeIds.map(id=>deriveStatus(id));
    const allMastered=nodeStatuses.every(s=>s==='mastered');
    const anyWeak=nodeStatuses.some(s=>s==='weak');
    const anyLearning=nodeStatuses.some(s=>s==='learning'||s==='mastered');
    const hasProblems=w.nodeIds.some(id=>probsFor(id).length>0);

    let bg='#0a0a0a', border='#2a2a2a', badge='', badgeCol='#64748b';
    if(allMastered){bg='rgba(34,211,160,.08)';border='var(--mastered)';badge='✓ 定着';badgeCol='var(--mastered)'}
    else if(anyWeak){bg='rgba(244,63,94,.06)';border='var(--weak)';badge='✗ 苦手';badgeCol='var(--weak)'}
    else if(anyLearning){bg='rgba(245,158,11,.06)';border='var(--learning)';badge='◐ 学習中';badgeCol='var(--learning)'}

    html+=`<div style="background:${bg};border:1.5px solid ${border};border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .15s"
      onmouseover="this.style.borderColor='${col}'" onmouseout="this.style.borderColor='${border}'"
      onclick="closeCurriculum();setFilter('${currTab}');setTimeout(()=>{const n=NODES.find(x=>x.id==='${w.nodeIds[0]}');if(n)openSidebar(n)},300)">
      <div style="font-size:9px;color:#64748b;font-weight:700;letter-spacing:1px;margin-bottom:4px">第${w.week}回</div>
      <div style="font-size:12px;font-weight:600;color:#f1f5f9;line-height:1.4;margin-bottom:6px">${w.title}</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:4px;flex-wrap:wrap">${w.nodeIds.map(id=>{
          const nd=NODES.find(x=>x.id===id);
          const st=deriveStatus(id);
          const dotCol=st==='mastered'?'var(--mastered)':st==='weak'?'var(--weak)':st==='learning'?'var(--learning)':'#2a2a2a';
          return `<span style="width:8px;height:8px;border-radius:50%;background:${dotCol};display:inline-block;border:1px solid #333" title="${nd?.label||id}"></span>`;
        }).join('')}</div>
        ${badge?`<span style="font-size:9px;font-weight:700;color:${badgeCol}">${badge}</span>`:''}
      </div>
    </div>`;
  });
    html += '</div>';
  });
  // summary bar
  const total=weeks.reduce((s,w)=>s+w.nodeIds.length,0);
  const mastered=weeks.reduce((s,w)=>s+w.nodeIds.filter(id=>deriveStatus(id)==='mastered').length,0);
  const pct=Math.round(mastered/total*100);
  html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px">
    <div style="flex:1;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden">
      <div style="height:100%;background:${col};border-radius:3px;width:${pct}%;transition:width .5s"></div>
    </div>
    <div style="font-size:12px;color:#f1f5f9;font-weight:700;white-space:nowrap">${mastered} / ${total} 単元定着 <span style="color:${col}">${pct}%</span></div>
  </div>`+html;
  document.getElementById('curr-body').innerHTML=html;
}



/* ══════════ PREVIEW UNLOCK (tap gray node) ══════════ */
function previewUnlock(d) {
  // show a quick color-wave preview of what this node would look like unlocked
  const g = d3.select('#graph').select('g');
  const ndEl = d3.selectAll('.node').filter(x=>x.id===d.id);
  const subCol = {math:'var(--math)',lang:'var(--lang)',sci:'var(--sci)',soc:'var(--soc)'}[d.cat];
  // flash node to subject color then back
  ndEl.select('circle')
    .transition().duration(150).attr('fill', subCol).attr('filter','brightness(1.4)')
    .transition().duration(300).attr('fill','#1a1a1a').attr('filter','');
  // ripple
  const rip = g.append('circle')
    .attr('cx',d.x).attr('cy',d.y).attr('r',d.critical?17:13)
    .attr('fill','none').attr('stroke',subCol)
    .attr('stroke-width',2).attr('stroke-opacity',.7)
    .attr('pointer-events','none');
  rip.transition().duration(800).ease(d3.easeExpOut)
    .attr('r',48).attr('stroke-opacity',0).remove();
  // briefly light up downstream in subject color too
  const downstream = LINKS
    .filter(l=>(l.source.id||l.source)===d.id)
    .map(l=>l.target.id||l.target);
  downstream.slice(0,4).forEach((tid,i)=>{
    setTimeout(()=>{
      const tnd = NODES.find(x=>x.id===tid);
      if(!tnd) return;
      const tel = d3.selectAll('.node').filter(x=>x.id===tid);
      tel.select('circle')
        .transition().duration(180).attr('fill',subCol).attr('opacity',.7)
        .transition().duration(500).attr('fill', masteryFill(tnd)).attr('opacity',1);
      const tr = g.append('circle')
        .attr('cx',tnd.x).attr('cy',tnd.y).attr('r',13)
        .attr('fill','none').attr('stroke',subCol)
        .attr('stroke-width',1).attr('stroke-opacity',.5)
        .attr('pointer-events','none');
      tr.transition().duration(600).ease(d3.easeExpOut)
        .attr('r',35).attr('stroke-opacity',0).remove();
    }, 180 + i*150);
  });
}
